<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Program</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .referral-container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .code-box { background: var(--surface); border-radius: 60px; padding: 16px; text-align: center; margin: 20px 0; }
    .code { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: var(--primary); }
    .share-btn { background: var(--primary); border: none; padding: 12px; border-radius: 60px; width: 100%; margin-bottom: 20px; font-weight: bold; }
    .referral-list { background: var(--surface); border-radius: 28px; padding: 16px; }
    .friend-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="referral-container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <button class="back-btn" onclick="window.location.href='profile.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Refer & Earn</h1>
    <div style="width:32px;"></div>
  </div>
  <div class="code-box">
    <div>Your referral code</div>
    <div class="code" id="refCode">INVESTOR123</div>
  </div>
  <button class="share-btn" id="shareRef"><i class="fas fa-share-alt"></i> Invite friends</button>
  <div class="referral-list">
    <div style="font-weight: bold; margin-bottom: 12px;">Friends who joined</div>
    <div id="friendsList">Loading...</div>
    <div style="margin-top: 12px;">Bonus earned: <strong id="bonusAmount">₦0</strong></div>
  </div>
</div>
<script src="backend-mock.js"></script>
<script src="global.js"></script>
<script>
  const refData = Backend.getReferrals();
  document.getElementById('refCode').innerText = refData.code;
  document.getElementById('bonusAmount').innerText = `₦${refData.bonus.toLocaleString()}`;
  const friendsDiv = document.getElementById('friendsList');
  if (refData.referrals.length === 0) friendsDiv.innerHTML = '<div>No referrals yet</div>';
  else friendsDiv.innerHTML = refData.referrals.map(f => `<div class="friend-item"><span>${f.name}</span><span>+₦500</span></div>`).join('');
  document.getElementById('shareRef').addEventListener('click', () => {
    if (navigator.share) navigator.share({ title: 'Join GTCO', text: `Use my code ${refData.code}`, url: window.location.href });
    else alert(`Share this code: ${refData.code}`);
    playSound('click');
  });
</script>
</body>
</html>

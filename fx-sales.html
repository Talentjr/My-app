<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FX Sales</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom:80px; }
    .screen { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
    .header { display:flex; justify-content:space-between; padding:18px 20px; align-items:center; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    .card { background: var(--surface); margin:80px 20px; border-radius:32px; padding:40px 24px; text-align:center; }
    .icon { background: rgba(255,59,123,0.2); width:70px; height:70px; border-radius:70px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:34px; color:var(--primary); }
    h2 { margin-bottom:16px; }
    p { margin-bottom:32px; color:var(--text-dim); }
    button { background: var(--primary); border:none; padding:14px; border-radius:60px; width:100%; font-weight:bold; cursor:pointer; }
    .bottom-nav { position:fixed; bottom:0; max-width:480px; width:100%; background:var(--surface); backdrop-filter:blur(8px); border-top:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-around; padding:10px 20px 22px; left:50%; transform:translateX(-50%); }
    .nav-item { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:12px; color:var(--text-dim); cursor:pointer; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>FX Sales</h1>
    <div style="width:32px;"></div>
  </div>
  <div class="card">
    <div class="icon"><i class="fas fa-clock"></i></div>
    <h2>Session closed</h2>
    <p>This service is available between 9am and 4pm Mondays to Fridays (excluding public holidays).</p>
    <button onclick="window.location.href='index.html'">Got it</button>
  </div>
  <div class="bottom-nav">...</div>
</div>
<script>
  document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ let nav=btn.dataset.nav; if(nav==='home') location.href='index.html'; else if(nav==='products') location.href='products.html'; else if(nav==='payments') location.href='payments.html'; else if(nav==='transfers') location.href='transfer.html'; else if(nav==='finances') location.href='finances.html'; }));
</script>
</body>
</html>

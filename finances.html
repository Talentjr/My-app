<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finances</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; --border:rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .screen { max-width:480px; margin:0 auto; padding:20px; }
    .header { display:flex; align-items:center; gap:16px; margin-bottom:30px; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    .card { background: var(--surface); border-radius:28px; padding:32px; text-align:center; border:1px solid var(--border); }
    .icon { font-size:64px; color:var(--primary); margin-bottom:20px; }
    h2 { margin-bottom:12px; }
    p { margin-bottom:24px; color:var(--text-dim); }
    a { color:var(--primary); text-decoration:none; font-weight:bold; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Finances</h1>
  </div>
  <div class="card">
    <div class="icon"><i class="fas fa-chart-line"></i></div>
    <h2>Coming soon</h2>
    <p>We are working very hard to complete it as soon as possible, but you can always use our other cool features.</p>
    <a href="https://gtfundmanagers.com" target="_blank">Click here to access the web</a>
  </div>
</div>
</body>
</html>

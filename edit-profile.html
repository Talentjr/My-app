<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; --border:rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .screen { max-width:480px; margin:0 auto; padding:20px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    .avatar-preview { width:100px; height:100px; background:var(--surface); border-radius:60px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:48px; overflow:hidden; }
    .avatar-preview img { width:100%; height:100%; object-fit:cover; }
    input, button { width:100%; padding:14px; margin-bottom:16px; border-radius:60px; border:1px solid var(--border); background:var(--surface); color:var(--text); }
    button { background:var(--primary); border:none; font-weight:bold; cursor:pointer; color:black; }
    .file-input { margin-bottom:16px; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="location.href='profile.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Edit Profile</h1>
    <div style="width:32px;"></div>
  </div>
  <div class="avatar-preview" id="avatarPreview"><i class="fas fa-user-circle"></i></div>
  <input type="file" id="avatarUpload" accept="image/*" class="file-input">
  <input type="text" id="fullName" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email">
  <input type="tel" id="phone" placeholder="Phone">
  <button id="saveProfile">Save Changes</button>
</div>
<script>
  let profile = JSON.parse(localStorage.getItem('profile')) || { name: 'Investor', email: 'investor@gtco.com', phone: '+234 812 345 6789', avatar: null };
  document.getElementById('fullName').value = profile.name;
  document.getElementById('email').value = profile.email;
  document.getElementById('phone').value = profile.phone;
  if (profile.avatar) {
    const img = document.createElement('img');
    img.src = profile.avatar;
    document.getElementById('avatarPreview').innerHTML = '';
    document.getElementById('avatarPreview').appendChild(img);
  }
  document.getElementById('avatarUpload').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        profile.avatar = ev.target.result;
        const img = document.createElement('img');
        img.src = profile.avatar;
        document.getElementById('avatarPreview').innerHTML = '';
        document.getElementById('avatarPreview').appendChild(img);
      };
      reader.readAsDataURL(file);
    }
  });
  document.getElementById('saveProfile').addEventListener('click', () => {
    profile.name = document.getElementById('fullName').value;
    profile.email = document.getElementById('email').value;
    profile.phone = document.getElementById('phone').value;
    localStorage.setItem('profile', JSON.stringify(profile));
    // Dispatch storage event to update other tabs
    window.dispatchEvent(new StorageEvent('storage', { key: 'profile', newValue: JSON.stringify(profile) }));
    alert('Profile updated');
    location.href = 'profile.html';
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .chat-container { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 20px; }
    .user { align-self: flex-end; background: var(--primary); color: black; }
    .bot { align-self: flex-start; background: var(--surface); }
    .input-area { display: flex; gap: 12px; padding: 16px; background: var(--surface); border-top: 1px solid var(--border); }
    .input-area input { flex: 1; padding: 12px; border-radius: 40px; border: none; background: var(--surface-solid); color: var(--text); }
    .input-area button { background: var(--primary); border: none; width: 48px; border-radius: 40px; cursor: pointer; }
  </style>
</head>
<body>
<div class="chat-container">
  <div style="display: flex; align-items: center; padding: 16px; gap: 16px;">
    <button class="back-btn" onclick="window.location.href='profile.html'"><i class="fas fa-arrow-left"></i></button>
    <h2>Support Chat</h2>
  </div>
  <div class="messages" id="chatMessages">
    <div class="message bot">👋 Hello! How can we help you today?</div>
  </div>
  <div class="input-area">
    <input type="text" id="chatInput" placeholder="Type your message...">
    <button id="sendMsg"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>
<script src="global.js"></script>
<script>
  const msgContainer = document.getElementById('chatMessages');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendMsg');
  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    div.innerText = text;
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
    playSound('click');
  }
  function botReply() {
    setTimeout(() => {
      addMessage("Our team will get back to you shortly. Thank you for reaching out.", 'bot');
    }, 1000);
  }
  sendBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    botReply();
  });
  input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
</script>
</body>
</html>

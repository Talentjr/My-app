<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; --border:rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .container { max-width:480px; margin:0 auto; padding:20px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    .card { background: var(--surface); border-radius:28px; padding:22px; margin-bottom:20px; border:1px solid var(--border); }
    .avatar { width:80px; height:80px; background:var(--surface); border-radius:60px; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:40px; }
    .setting-item { display:flex; justify-content:space-between; padding:16px; background:var(--surface); border-radius:60px; margin-bottom:12px; cursor:pointer; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Profile</h1>
    <div style="width:32px;"></div>
  </div>
  <div class="card">
    <div class="avatar"><i class="fas fa-user-astronaut"></i></div>
    <h2 id="userName" style="text-align:center;">Investor</h2>
    <p id="userEmail" style="text-align:center; color:var(--text-dim);">investor@gtco.com</p>
  </div>
  <div class="setting-item" id="editProfileBtn"><span>Edit Profile</span> <i class="fas fa-chevron-right"></i></div>
  <div class="setting-item" id="changePinBtn"><span>Change Transaction PIN</span> <i class="fas fa-chevron-right"></i></div>
  <div class="setting-item" id="cardsBtn"><span>Manage Cards</span> <i class="fas fa-chevron-right"></i></div>
  <div class="setting-item" id="supportBtn"><span>Support Chat</span> <i class="fas fa-chevron-right"></i></div>
  <div class="setting-item" id="referralBtn"><span>Referral Program</span> <i class="fas fa-chevron-right"></i></div>
</div>
<script>
  let profile = JSON.parse(localStorage.getItem('profile')) || { name: 'Investor', email: 'investor@gtco.com' };
  document.getElementById('userName').innerText = profile.name;
  document.getElementById('userEmail').innerText = profile.email;
  document.getElementById('editProfileBtn').onclick = () => location.href = 'edit-profile.html';
  document.getElementById('changePinBtn').onclick = () => alert('PIN change demo');
  document.getElementById('cardsBtn').onclick = () => location.href = 'card-management.html';
  document.getElementById('supportBtn').onclick = () => location.href = 'support-chat.html';
  document.getElementById('referralBtn').onclick = () => location.href = 'referral.html';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .cards-container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .card-item { background: var(--surface); border-radius: 24px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .card-details { display: flex; gap: 16px; align-items: center; }
    .delete-card { color: var(--error); cursor: pointer; }
    .add-card-btn { background: var(--primary); border: none; width: 100%; padding: 14px; border-radius: 60px; margin-top: 20px; }
  </style>
</head>
<body>
<div class="cards-container">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
    <button class="back-btn" onclick="window.location.href='profile.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>My Cards</h1>
    <div style="width:32px;"></div>
  </div>
  <div id="cardsList"></div>
  <button class="add-card-btn" id="addCard">+ Add new card</button>
</div>
<script src="backend-mock.js"></script>
<script src="global.js"></script>
<script>
  function renderCards() {
    const cards = Backend.getCards();
    const container = document.getElementById('cardsList');
    if (!container) return;
    container.innerHTML = cards.map(c => `
      <div class="card-item" data-id="${c.id}">
        <div class="card-details">
          <i class="fab fa-cc-${c.type === 'Visa' ? 'visa' : 'mastercard'} fa-2x"></i>
          <div>**** **** **** ${c.last4}<br><small>Expires ${c.expiry}</small></div>
        </div>
        <div class="delete-card" data-id="${c.id}"><i class="fas fa-trash-alt"></i></div>
      </div>
    `).join('');
    document.querySelectorAll('.delete-card').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.getAttribute('data-id'));
        Backend.deleteCard(id);
        renderCards();
        playSound('click');
        vibrate(20);
      });
    });
  }
  renderCards();
  document.getElementById('addCard').addEventListener('click', () => {
    const newCard = { id: Date.now(), last4: Math.floor(1000 + Math.random() * 9000).toString(), type: 'Visa', expiry: '12/30' };
    Backend.addCard(newCard);
    renderCards();
    playSound('success');
  });
</script>
</body>
</html>

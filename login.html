<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GTCO · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="global.css">
  <style>
    .login-screen {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }
    .pin-dots { display: flex; justify-content: center; gap: 18px; margin: 30px 0; }
    .dot { width: 20px; height: 20px; border-radius: 50%; background: var(--text-dim); transition: 0.1s; }
    .dot.filled { background: var(--primary); }
    .keypad { margin: 20px 0; }
    .keypad-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
    .key-btn { width: 72px; height: 72px; border-radius: 60px; background: var(--surface); border: 1px solid var(--border); font-size: 28px; font-weight: 600; color: var(--text); cursor: pointer; }
    .forgot-link { text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
<div class="login-screen">
  <div style="text-align: center; margin-bottom: 20px;">
    <h1 style="background: linear-gradient(135deg, #00f260, #00e5ff); -webkit-background-clip: text; color: transparent;">GTCO</h1>
    <p>Enter 6-digit PIN</p>
  </div>
  <div class="pin-dots" id="pinDots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="keypad">
    <div class="keypad-row">
      <button class="key-btn" data-digit="1">1</button><button class="key-btn" data-digit="2">2</button><button class="key-btn" data-digit="3">3</button>
    </div>
    <div class="keypad-row">
      <button class="key-btn" data-digit="4">4</button><button class="key-btn" data-digit="5">5</button><button class="key-btn" data-digit="6">6</button>
    </div>
    <div class="keypad-row">
      <button class="key-btn" data-digit="7">7</button><button class="key-btn" data-digit="8">8</button><button class="key-btn" data-digit="9">9</button>
    </div>
    <div class="keypad-row">
      <button class="key-btn" data-digit="0">0</button>
      <button class="key-btn" id="deleteBtn"><i class="fas fa-backspace"></i></button>
    </div>
  </div>
  <a href="#" class="forgot-link" id="forgotPin">Forgot PIN?</a>
</div>
<script src="global.js"></script>
<script>
  let enteredPin = '';
  const correctPin = '123456';
  const dots = document.querySelectorAll('.dot');
  function updateDots() {
    dots.forEach((dot, i) => {
      if (i < enteredPin.length) dot.classList.add('filled');
      else dot.classList.remove('filled');
    });
  }
  function showError(msg) {
    let t = document.querySelector('.toast-message');
    if(t) t.remove();
    let toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerText = msg;
    toast.style.background = 'var(--error)';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  function addDigit(d) {
    if (enteredPin.length < 6) {
      enteredPin += d;
      updateDots();
      if (enteredPin.length === 6) {
        if (enteredPin === correctPin) {
          window.location.href = 'index.html';
        } else {
          showError('Incorrect PIN. Please try again.');
          enteredPin = '';
          updateDots();
        }
      }
    }
  }
  function deleteLast() {
    enteredPin = enteredPin.slice(0, -1);
    updateDots();
  }
  document.querySelectorAll('.key-btn[data-digit]').forEach(btn => {
    btn.addEventListener('click', () => addDigit(btn.getAttribute('data-digit')));
  });
  document.getElementById('deleteBtn').addEventListener('click', deleteLast);
  document.getElementById('forgotPin').addEventListener('click', (e) => {
    e.preventDefault();
    showError('Reset PIN via email (demo)');
  });
  // enable audio context on first touch (for sounds)
  document.body.addEventListener('touchstart', () => { playSound('click'); }, { once: true });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Payment</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .form-card { max-width: 480px; margin: 0 auto; padding: 20px; }
    select, input { width: 100%; padding: 14px; margin: 8px 0 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 60px; color: var(--text); }
    button { background: var(--primary); width: 100%; padding: 14px; border-radius: 60px; border: none; font-weight: bold; }
  </style>
</head>
<body>
<div class="form-card">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
    <button class="back-btn" onclick="window.location.href='payments.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Bill Payment</h1>
    <div style="width:32px;"></div>
  </div>
  <select id="biller">
    <option value="dstv">DSTV</option>
    <option value="gotv">GOtv</option>
    <option value="ikeja">Ikeja Electric</option>
    <option value="lagoswater">Lagos Water</option>
    <option value="phcn">PHCN (Prepaid)</option>
  </select>
  <input type="text" id="accountNo" placeholder="Meter / Customer number">
  <input type="number" id="amount" placeholder="Amount (₦)">
  <button id="payBill">Pay Now</button>
</div>
<script src="backend-mock.js"></script>
<script src="global.js"></script>
<script>
  document.getElementById('payBill').addEventListener('click', () => {
    const biller = document.getElementById('biller').options[document.getElementById('biller').selectedIndex].text;
    const account = document.getElementById('accountNo').value;
    const amount = parseFloat(document.getElementById('amount').value);
    if (!account || !amount || amount <= 0) {
      showToast('Please fill all fields', true);
      return;
    }
    // simulate payment
    playSound('click');
    showToast('Processing...');
    setTimeout(() => {
      Backend.addTransaction({
        date: new Date().toISOString().split('T')[0],
        description: `${biller} payment - ${account}`,
        amount: amount,
        type: 'debit',
        status: 'completed',
        reference: `BILL${Date.now()}`
      });
      playSound('success');
      vibrate(50);
      showToast(`₦${amount.toLocaleString()} paid to ${biller} successfully`);
      setTimeout(() => window.location.href = 'payments.html', 2000);
    }, 2000);
  });
  function showToast(msg, isErr) {
    let t = document.querySelector('.toast-message');
    if(t) t.remove();
    let toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerText = msg;
    if(isErr) toast.style.background = 'var(--error)';
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 3000);
  }
</script>
</body>
</html>

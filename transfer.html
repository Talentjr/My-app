<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; --border:rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom:80px; }
    .screen { max-width:480px; margin:0 auto; }
    .header { display:flex; justify-content:space-between; padding:18px 20px; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    .search { background:var(--surface); margin:0 20px 16px; border-radius:60px; padding:12px 18px; display:flex; gap:12px; border:1px solid var(--border); }
    .search input { flex:1; background:none; border:none; color:var(--text); outline:none; }
    .beneficiary-list { margin:0 16px; background:var(--surface); border-radius:32px; overflow-y:auto; max-height:60vh; }
    .beneficiary-item { display:flex; align-items:center; gap:16px; padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; }
    .initials { width:52px; height:52px; background:rgba(0,242,96,0.2); border-radius:60px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .bottom-nav { position:fixed; bottom:0; max-width:480px; width:100%; background:var(--surface); backdrop-filter:blur(8px); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:10px 20px 22px; left:50%; transform:translateX(-50%); }
    .nav-item { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:12px; color:var(--text-dim); cursor:pointer; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Transfer</h1>
    <div style="width:32px;"></div>
  </div>
  <div class="search">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search by name or account number">
  </div>
  <div class="beneficiary-list" id="beneficiaryList"></div>
  <div class="bottom-nav">
    <button class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-item" data-nav="products"><i class="fas fa-boxes"></i><span>Products</span></button>
    <button class="nav-item" data-nav="payments"><i class="fas fa-receipt"></i><span>Payments</span></button>
    <button class="nav-item active" data-nav="transfers"><i class="fas fa-arrow-right-arrow-left"></i><span>Transfers</span></button>
    <button class="nav-item" data-nav="finances"><i class="fas fa-chart-pie"></i><span>Finances</span></button>
  </div>
</div>
<script>
  // Generate 55 beneficiaries with realistic names and accounts
  const firstNames = ['Chidi', 'Amina', 'Olu', 'Ngozi', 'Tunde', 'Fatima', 'Kunle', 'Ifeanyi', 'Zainab', 'Emeka'];
  const lastNames = ['Okafor', 'Bello', 'Adebayo', 'Eze', 'Balogun', 'Musa', 'Okonkwo', 'Ibrahim', 'Ogunlesi', 'Nwosu'];
  let beneficiaries = [];
  for (let i = 1; i <= 55; i++) {
    let name = `${firstNames[i % firstNames.length]} ${lastNames[i % lastNames.length]}`;
    let account = `0${Math.floor(1000000000 + Math.random() * 9000000000)}`;
    let bank = i % 3 === 0 ? 'Gtbank' : (i % 2 === 0 ? 'UBA' : 'Access Bank');
    beneficiaries.push({
      initials: name.split(' ').map(n => n[0]).join(''),
      name: name,
      bank: bank,
      account: account,
      currency: 'NGN'
    });
  }
  let currentList = [...beneficiaries];
  function renderList(list) {
    const container = document.getElementById('beneficiaryList');
    container.innerHTML = list.map(b => `
      <div class="beneficiary-item" data-name="${b.name}" data-account="${b.account}" data-bank="${b.bank}">
        <div class="initials">${b.initials}</div>
        <div><div>${b.name}</div><div style="font-size:12px;">${b.bank} • ${b.account} • ${b.currency}</div></div>
      </div>
    `).join('');
    document.querySelectorAll('.beneficiary-item').forEach(el => {
      el.addEventListener('click', () => {
        sessionStorage.setItem('transferBeneficiary', JSON.stringify({
          name: el.dataset.name,
          account: el.dataset.account,
          bank: el.dataset.bank,
          currency: 'NGN'
        }));
        location.href = 'transfer-detail.html';
      });
    });
  }
  renderList(currentList);
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    if (!term) currentList = [...beneficiaries];
    else currentList = beneficiaries.filter(b => b.name.toLowerCase().includes(term) || b.account.includes(term));
    renderList(currentList);
  });
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const nav = btn.dataset.nav;
      if (nav === 'home') location.href = 'index.html';
      else if (nav === 'products') location.href = 'products.html';
      else if (nav === 'payments') location.href = 'payments.html';
      else if (nav === 'transfers') location.href = 'transfer.html';
      else if (nav === 'finances') location.href = 'finances.html';
    });
  });
</script>
</body>
</html>

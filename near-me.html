<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Near Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0e1a; --surface:rgba(18,22,36,0.8); --text:#f0f3fa; --primary:#00f260; --border:rgba(255,255,255,0.08); }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom:80px; }
    .screen { max-width:480px; margin:0 auto; }
    .header { display:flex; justify-content:space-between; padding:18px 20px; align-items:center; }
    .back-btn { background:none; border:none; font-size:24px; color:var(--primary); cursor:pointer; }
    #map { height: 280px; margin: 0 16px 16px; border-radius: 28px; overflow:hidden; }
    .searching { text-align:center; background: var(--surface); margin:0 16px 16px; border-radius:60px; padding:12px; display:flex; justify-content:center; gap:8px; }
    .nearby-list { margin: 0 16px; background: var(--surface); border-radius:32px; overflow:hidden; }
    .user-item { display:flex; align-items:center; gap:16px; padding:16px; border-bottom:1px solid var(--border); cursor:pointer; }
    .avatar { width:48px; height:48px; background: rgba(0,242,96,0.2); border-radius:60px; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .bottom-nav { position:fixed; bottom:0; max-width:480px; width:100%; background:var(--surface); backdrop-filter:blur(8px); border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:10px 20px 22px; left:50%; transform:translateX(-50%); z-index:100; }
    .nav-item { background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px; font-size:12px; color:var(--text-dim); cursor:pointer; }
    .nav-item i { font-size:22px; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
    <h1>Near me</h1>
    <div style="width:32px;"></div>
  </div>
  <div id="map"></div>
  <div class="searching"><i class="fas fa-spinner fa-pulse"></i> Searching for nearby GT users...</div>
  <div class="nearby-list" id="userList"></div>
  <div class="bottom-nav">
    <button class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-item" data-nav="products"><i class="fas fa-boxes"></i><span>Products</span></button>
    <button class="nav-item" data-nav="payments"><i class="fas fa-receipt"></i><span>Payments</span></button>
    <button class="nav-item" data-nav="transfers"><i class="fas fa-arrow-right-arrow-left"></i><span>Transfers</span></button>
    <button class="nav-item" data-nav="finances"><i class="fas fa-chart-pie"></i><span>Finances</span></button>
  </div>
</div>
<script>
  const users = [
    { initials: "CM", name: "Chinyere M.", distance: "0.3 km", lat: 6.4654, lng: 3.4064 },
    { initials: "OA", name: "Olaekan A.", distance: "0.7 km", lat: 6.4680, lng: 3.4090 },
    { initials: "EA", name: "Emediong A.", distance: "1.2 km", lat: 6.4620, lng: 3.4110 }
  ];
  const center = [6.465422, 3.406448];
  let map = L.map('map').setView(center, 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
  L.marker(center).bindTooltip('You').addTo(map);
  users.forEach(u => { L.marker([u.lat, u.lng]).bindTooltip(u.name).addTo(map); });
  const listDiv = document.getElementById('userList');
  listDiv.innerHTML = users.map(u => `<div class="user-item"><div class="avatar">${u.initials}</div><div><strong>${u.name}</strong><br><small>${u.distance} away</small></div></div>`).join('');
  document.querySelectorAll('.nav-item').forEach(btn=>btn.addEventListener('click',()=>{ let nav=btn.dataset.nav; if(nav==='home') location.href='index.html'; else if(nav==='products') location.href='products.html'; else if(nav==='payments') location.href='payments.html'; else if(nav==='transfers') location.href='transfer.html'; else if(nav==='finances') location.href='finances.html'; }));
</script>
</body>
</html>
